<style>/* inherit to force styles through use tags */
svg path {
    fill: inherit;
}

/* font and background color specifications */
svg.keymap {
    font-family: SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;
    font-size: 14px;
    font-kerning: normal;
    text-rendering: optimizeLegibility;
    fill: #24292e;
}

/* default key styling */
rect.key {
    fill: #f6f8fa;
}

rect.key, rect.combo {
    stroke: #c9cccf;
    stroke-width: 1;
}

/* default key side styling, only used is draw_key_sides is set */
rect.side {
    filter: brightness(90%);
}

/* color accent for combo boxes */
rect.combo, rect.combo-separate {
    fill: #cdf;
}

/* color accent for held keys */
rect.held, rect.combo.held {
    fill: #fdd;
}

/* color accent for ghost (optional) keys */
rect.ghost, rect.combo.ghost {
    stroke-dasharray: 4, 4;
    stroke-width: 2;
}

text {
    text-anchor: middle;
    dominant-baseline: middle;
}

/* styling for layer labels */
text.label {
    font-weight: bold;
    text-anchor: start;
    stroke: white;
    stroke-width: 4;
    paint-order: stroke;
}

/* styling for optional footer */
text.footer {
    text-anchor: end;
    dominant-baseline: auto;
    stroke: white;
    stroke-width: 4;
    paint-order: stroke;
}

/* styling for combo tap, and key non-tap label text */
text.combo, text.hold, text.shifted, text.left, text.right, text.tl, text.tr, text.bl, text.br {
    font-size: 11px;
}

text.hold, text.bl, text.br {
    text-anchor: middle;
    dominant-baseline: auto;
}

text.shifted, text.tl, text.tr {
    text-anchor: middle;
    dominant-baseline: hanging;
}

text.left, text.tl, text.bl {
    text-anchor: start;
}

text.right, text.tr, text.br {
    text-anchor: end;
}

text.layer-activator {
    text-decoration: underline;
}

/* styling for hold/shifted label text in combo box */
text.combo.hold, text.combo.shifted, text.combo.left, text.combo.right {
    font-size: 8px;
}

/* lighter symbol for transparent keys */
text.trans {
    fill: #7b7e81;
}

/* styling for combo dendrons */
path.combo {
    stroke-width: 1;
    stroke: gray;
    fill: none;
}

/* Start Tabler Icons Cleanup */
/* cannot use height/width with glyphs */
.icon-tabler > path {
    fill: inherit;
    stroke: inherit;
    stroke-width: 2;
}
/* hide tabler's default box */
.icon-tabler > path[stroke="none"][fill="none"] {
    visibility: hidden;
}
/* End Tabler Icons Cleanup */

.key.modifier rect { fill: #d6e5f5; stroke: #4a7ab8; }
.key.modifier :not(rect) { fill: #4a7ab8; }
.key.nav rect { fill: #d9f0d9; stroke: #5ca75c; }
.key.nav :not(rect) { fill: #5ca75c; }
.key.editing rect { fill: #ffe4d1; stroke: #e88a3a; }
.key.editing :not(rect) { fill: #e88a3a; }
.key.layer rect { fill: #ead9eb; stroke: #9a5fa1; }
.key.layer :not(rect) { fill: #9a5fa1; }
.key.system rect { fill: #fff4d1; stroke: #e8b52a; }
.key.system :not(rect) { fill: #e8b52a; }
.key.symbol rect { fill: #d4f0e8; stroke: #4aa78a; }
.key.symbol :not(rect) { fill: #4aa78a; }
.key.accent rect { fill: #ffe0d6; stroke: #e86d4a; }
.key.accent :not(rect) { fill: #e86d4a; }
</style>
